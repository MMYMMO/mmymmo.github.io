<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>

body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

/* =======================
   2x2 グリッド
======================= */

.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
  height:100vh;
}

.cell{
  position:relative;
  overflow:hidden;
  background:#111;
}

/* =======================
   YouTube iframe
======================= */

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* =======================
   情報表示
======================= */

.info{
  position:absolute;
  left:5px;
  bottom:5px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:4px 8px;
  font-size:12px;
  display:none;
  z-index:10;
}

.cell:hover .info{
  display:block;
}

/* =======================
   上半分 / 下半分クリック
======================= */

.clickTop,
.clickBottom{
  position:absolute;
  left:0;
  width:100%;
  z-index:20;
  cursor:pointer;
}

.clickTop{
  top:0;
  height:50%;
}

.clickBottom{
  bottom:0;
  height:50%;
}

/* デバッグ用
.clickTop{ background:rgba(255,0,0,0.1); }
.clickBottom{ background:rgba(0,0,255,0.1); }
*/

</style>
</head>

<body>

<div class="container">

  <!-- A -->
  <div class="cell">

    <iframe id="frameA" allow="autoplay"></iframe>

    <div class="clickTop"
         onclick="prev('A')"></div>

    <div class="clickBottom"
         onclick="next('A')"></div>

    <div class="info" id="infoA"></div>

  </div>

  <!-- B -->
  <div class="cell">

    <iframe id="frameB" allow="autoplay"></iframe>

    <div class="clickTop"
         onclick="prev('B')"></div>

    <div class="clickBottom"
         onclick="next('B')"></div>

    <div class="info" id="infoB"></div>

  </div>

  <!-- C -->
  <div class="cell">

    <iframe id="frameC" allow="autoplay"></iframe>

    <div class="clickTop"
         onclick="prev('C')"></div>

    <div class="clickBottom"
         onclick="next('C')"></div>

    <div class="info" id="infoC"></div>

  </div>

  <!-- D -->
  <div class="cell">

    <iframe id="frameD" allow="autoplay"></iframe>

    <div class="clickTop"
         onclick="prev('D')"></div>

    <div class="clickBottom"
         onclick="next('D')"></div>

    <div class="info" id="infoD"></div>

  </div>

</div>

<script>

/* ==========================================
   プレイリスト
   Shortsも普通動画もOK
========================================== */

const playlists = {

  A:[
    "dQw4w9WgXcQ",
    "ysz5S6PUM-U",
    "ScMzIvxBSi4"
  ],

  B:[
    "aqz-KE-bpKQ",
    "M7lc1UVf-VE",
    "5qap5aO4i9A"
  ],

  C:[
    "LXb3EKWsInQ",
    "hHW1oY26kxQ",
    "kXYiU_JCYtU"
  ],

  D:[
    "9bZkp7q19f0",
    "RgKAFK5djSk",
    "60ItHLz5WEA"
  ]

};

/* ==========================================
   現在位置
========================================== */

let index = {
  A:0,
  B:0,
  C:0,
  D:0
};

/* ==========================================
   ランダム初期化
========================================== */

["A","B","C","D"].forEach(type => {

  index[type] =
    Math.floor(Math.random() *
    playlists[type].length);

});

/* ==========================================
   iframe 更新
========================================== */

function update(type){

  const list = playlists[type];

  const videoId = list[index[type]];

  /* hover中だけ操作バー表示 */
  const controls = 0;

  /* 最初だけ音ON */
  const mute = (type === "A") ? 0 : 1;

  const url =
    `https://www.youtube.com/embed/${videoId}`
    + `?autoplay=1`
    + `&mute=${mute}`
    + `&loop=1`
    + `&playlist=${videoId}`
    + `&controls=${controls}`
    + `&rel=0`
    + `&playsinline=1`;

  document.getElementById(
    "frame"+type).src = url;

  document.getElementById(
    "info"+type).textContent =
    `${type} : ${videoId}`;

}

/* ==========================================
   次
========================================== */

function next(type){

  index[type]++;

  if(index[type] >= playlists[type].length){
    index[type] = 0;
  }

  update(type);

}

/* ==========================================
   前
========================================== */

function prev(type){

  index[type]--;

  if(index[type] < 0){
    index[type] =
      playlists[type].length - 1;
  }

  update(type);

}

/* ==========================================
   初期化
========================================== */

["A","B","C","D"].forEach(type => {
  update(type);
});

/* ==========================================
   一定時間ごとランダム変更
========================================== */

setInterval(() => {

  const types = ["A","B","C","D"];

  const type =
    types[Math.floor(Math.random()*4)];

  const max =
    playlists[type].length;

  index[type] =
    Math.floor(Math.random()*max);

  update(type);

}, 15000);

/* ==========================================
   マウスオーバーで操作バー表示
========================================== */

document.querySelectorAll(".cell")
.forEach(cell => {

  cell.addEventListener("mouseenter", () => {

    const iframe =
      cell.querySelector("iframe");

    iframe.style.pointerEvents = "auto";

  });

  cell.addEventListener("mouseleave", () => {

    const iframe =
      cell.querySelector("iframe");

    iframe.style.pointerEvents = "none";

  });

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
}

/* 2x2 */
.container{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(2,1fr);
  height:100vh;
}

.cell{
  position:relative;
  overflow:hidden;
}

/* YouTube iframe */
iframe{
  width:100%;
  height:100%;
  border:none;
  pointer-events:none; /* ← クリックを親に通す */
}

/* ファイル名表示 */
.filename{
  position:absolute;
  bottom:5px;
  left:5px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:2px 6px;
  font-size:12px;
  display:none;
}

.cell:hover .filename{
  display:block;
}
</style>
</head>

<body>

<div class="container">

  <div class="cell" onclick="next('A')">
    <iframe id="frameA"></iframe>
    <div class="filename" id="nameA"></div>
  </div>

  <div class="cell" onclick="next('B')">
    <iframe id="frameB"></iframe>
    <div class="filename" id="nameB"></div>
  </div>

  <div class="cell" onclick="next('C')">
    <iframe id="frameC"></iframe>
    <div class="filename" id="nameC"></div>
  </div>

  <div class="cell" onclick="next('D')">
    <iframe id="frameD"></iframe>
    <div class="filename" id="nameD"></div>
  </div>

</div>

<script>

/* ===== YouTube動画ID一覧 ===== */

const youtubeVideos = [

  "iAQBsAgC",
  "rB_nzP76ktc",
  "qYnCG4J26d8",
  "zKOa2NAlxXw",
  "xPgeZzojY5o",
  "AeMUdOPFcXI",
  "lsxYH2XQQCg",
  "Pcj4xeEgbj8",
  "3KZ20aH_Oq4",
  "B_Sc1v1qR-g",
  "n1TtSZ7z7c0",
  "ZRUh9gNk8-g",
  "Xn7YQxxC5R0",
  "DjdUEyjx8GM",
  "hBaHx5WdnbQ",
  "6S4qvf97cbQ"

];

/* ========================= */

let index = {
  A:0,
  B:1,
  C:2,
  D:3
};

/* iframe更新 */
function update(type){

  const videoId = youtubeVideos[index[type]];

  const url =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}`;

  document.getElementById("frame"+type).src = url;

  document.getElementById("name"+type).textContent =
    videoId;
}

/* 次へ */
function next(type){

  index[type]++;

  if(index[type] >= youtubeVideos.length){
    index[type] = 0;
  }

  update(type);
}

/* 初期化 */
["A","B","C","D"].forEach(update);

</script>

</body>
</html>
